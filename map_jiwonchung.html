<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충청남도 교육지원청 정밀 안내 지도</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f1f5f9;
        }

        #map {
            height: 600px;
            width: 100%;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1;
        }

        .custom-label {
            background: none;
            border: none;
            box-shadow: none;
            font-weight: bold;
            color: #1e293b;
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
        }

        .info-card {
            transition: all 0.3s ease;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border-radius: 1rem;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6">
            <h1 class="text-3xl font-bold text-slate-800">충청남도 교육지원청 정밀 지도</h1>
            <p class="text-slate-600 mt-2">실제 행정 구역 경계 데이터를 기반으로 한 교육지원청 위치 안내입니다.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Map Area -->
            <div class="lg:col-span-3 relative">
                <div id="loading" class="loading-overlay">
                    <div class="flex flex-col items-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-2"></div>
                        <p class="text-sm text-slate-600">지도 데이터를 불러오는 중...</p>
                    </div>
                </div>
                <div id="map"></div>
            </div>

            <!-- Side Panel -->
            <div class="space-y-4">
                <div id="detail-panel" class="bg-white p-6 rounded-xl shadow-md border border-slate-200 hidden">
                    <h2 id="office-name" class="text-xl font-bold text-blue-700"></h2>
                    <p class="text-sm text-slate-500 mt-1" id="office-region"></p>
                    <div class="mt-4 space-y-3">
                        <div class="flex items-start">
                            <svg class="w-5 h-5 text-slate-400 mr-2 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                            <span id="office-addr" class="text-sm text-slate-700 leading-relaxed"></span>
                        </div>
                    </div>
                    <button onclick="zoomToOffice()" class="w-full mt-6 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">위치 확대하기</button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
                    <h3 class="font-bold text-slate-800 mb-3">지도 정보</h3>
                    <ul class="text-sm space-y-2 text-slate-600">
                        <li class="flex items-center"><span class="w-3 h-3 bg-blue-500 bg-opacity-20 border border-blue-500 rounded-sm mr-2"></span> 시·군 행정 경계</li>
                        <li class="flex items-center"><span class="w-3 h-3 bg-red-500 rounded-full mr-2"></span> 교육지원청 위치</li>
                    </ul>
                    <p class="text-xs text-slate-400 mt-4 leading-relaxed">
                        * 실제 GPS 좌표와 행정구역 경계 데이터(GeoJSON)를 활용하였습니다.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data: Education Offices
        const educationOffices = [
            { id: 'cheonan', name: '충청남도천안교육지원청', region: '천안시', lat: 36.8151, lng: 127.1132, addr: '충청남도 천안시 서북구 번영로 156' },
            { id: 'gongju', name: '충청남도공주교육지원청', region: '공주시', lat: 36.4465, lng: 127.1193, addr: '충청남도 공주시 봉황로 75' },
            { id: 'boryeong', name: '충청남도보령교육지원청', region: '보령시', lat: 36.3333, lng: 126.6121, addr: '충청남도 보령시 대천로 42' },
            { id: 'asan', name: '충청남도아산교육지원청', region: '아산시', lat: 36.7898, lng: 127.0048, addr: '충청남도 아산시 아산로 109' },
            { id: 'seosan', name: '충청남도서산교육지원청', region: '서산시', lat: 36.7845, lng: 126.4504, addr: '충청남도 서산시 호수공원1로 25' },
            { id: 'nonsan', name: '충청남도논산계룡교육지원청', region: '논산시/계룡시', lat: 36.1872, lng: 127.0984, addr: '충청남도 논산시 시민로 267' },
            { id: 'dangjin', name: '충청남도당진교육지원청', region: '당진시', lat: 36.8997, lng: 126.6455, addr: '충청남도 당진시 수청로 46' },
            { id: 'geumsan', name: '충청남도금산교육지원청', region: '금산군', lat: 36.1086, lng: 127.4877, addr: '충청남도 금산군 금산읍 군청길 39' },
            { id: 'buyeo', name: '충청남도부여교육지원청', region: '부여군', lat: 36.2745, lng: 126.9126, addr: '충청남도 부여군 부여읍 성왕로 202' },
            { id: 'seocheon', name: '충청남도서천교육지원청', region: '서천군', lat: 36.0801, lng: 126.6912, addr: '충청남도 서천군 서천읍 군청로 51' },
            { id: 'cheongyang', name: '충청남도청양교육지원청', region: '청양군', lat: 36.4468, lng: 126.8041, addr: '충청남도 청양군 청양읍 문화예술로 142' },
            { id: 'hongseong', name: '충청남도홍성교육지원청', region: '홍성군', lat: 36.6013, lng: 126.6608, addr: '충청남도 홍성군 홍성읍 조양로 115' },
            { id: 'yesan', name: '충청남도예산교육지원청', region: '예산군', lat: 36.6811, lng: 126.8464, addr: '충청남도 예산군 예산읍 예산로 154' },
            { id: 'taean', name: '충청남도태안교육지원청', region: '태안군', lat: 36.7455, lng: 126.2977, addr: '충청남도 태안군 태안읍 백화로 180' }
        ];

        let map;
        let selectedOffice = null;

        window.onload = function() {
            // Initialize map centered on Chungnam
            map = L.map('map').setView([36.65, 126.8], 9);

            // Add tile layer (OpenStreetMap)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Load Boundary GeoJSON
            // South Korea Municipality GeoJSON (Simplified)
            fetch('https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2013/json/skorea_municipalities_geo_simple.json')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading').classList.add('hidden');
                    
                    // Filter for Chungnam (Province code starts with 34 or 44 depending on data version)
                    // In many sets, 44 is Chungnam.
                    const chungnamData = {
                        type: "FeatureCollection",
                        features: data.features.filter(f => f.properties.code && f.properties.code.startsWith('34'))
                    };

                    L.geoJSON(chungnamData, {
                        style: function(feature) {
                            return {
                                fillOpacity: 0.1,
                                fillColor: '#3b82f6',
                                color: '#3b82f6',
                                weight: 1.5
                            };
                        },
                        onEachFeature: function(feature, layer) {
                            layer.on('mouseover', function() {
                                this.setStyle({ fillOpacity: 0.3 });
                            });
                            layer.on('mouseout', function() {
                                this.setStyle({ fillOpacity: 0.1 });
                            });
                            // Add Label for regions
                            if (feature.properties.name) {
                                layer.bindTooltip(feature.properties.name, {
                                    permanent: true,
                                    direction: 'center',
                                    className: 'custom-label'
                                });
                            }
                        }
                    }).addTo(map);
                    
                    // Add Markers for Education Offices
                    educationOffices.forEach(office => {
                        const marker = L.circleMarker([office.lat, office.lng], {
                            radius: 7,
                            fillColor: "#ef4444",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 1
                        }).addTo(map);

                        marker.on('click', () => showDetail(office));
                        marker.bindTooltip(office.name, { offset: [0, -5], direction: 'top' });
                    });
                })
                .catch(err => {
                    console.error('Map data load failed:', err);
                    document.getElementById('loading').innerHTML = '<p class="text-red-500">데이터를 불러오지 못했습니다. 새로고침 해주세요.</p>';
                });
        };

        function showDetail(office) {
            selectedOffice = office;
            document.getElementById('detail-panel').classList.remove('hidden');
            document.getElementById('office-name').textContent = office.name;
            document.getElementById('office-region').textContent = office.region;
            document.getElementById('office-addr').textContent = office.addr;
        }

        function zoomToOffice() {
            if (selectedOffice) {
                map.flyTo([selectedOffice.lat, selectedOffice.lng], 13);
            }
        }
    </script>
</body>
</html>
